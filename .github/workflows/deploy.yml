name: PR Checks

on:
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'

# Concurrency: cancel previous PR checks if a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Stage 1: Lint & Type Check (runs in ~2 minutes)
  # ─────────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Run TypeScript type check
        run: npm run type-check
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 2: Unit Tests (runs in ~3 minutes)
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test -- --coverage
        continue-on-error: false

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 3: Security Audit (npm audit + npm audit fetch)
  # ─────────────────────────────────────────────────────────────────────────
  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit for high-severity vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 4: Application Build (runs in ~3 minutes)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-and-typecheck, unit-tests, security-audit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 5: Infrastructure Code Analysis (tfsec + Checkov)
  # ─────────────────────────────────────────────────────────────────────────
  infrastructure-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tfsec
        run: |
          curl -sSL https://github.com/aquasecurity/tfsec/releases/download/v1.28.0/tfsec-linux-amd64 -o tfsec
          chmod +x tfsec
          sudo mv tfsec /usr/local/bin/

      - name: Run tfsec for Terraform security
        run: |
          if [ -d "infra/" ]; then
            tfsec infra/ --severity HIGH,CRITICAL
          else
            echo "No infra/ directory found, skipping tfsec"
          fi
        continue-on-error: true

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov for infrastructure compliance
        run: |
          if [ -d "infra/" ]; then
            checkov -d infra/ --framework terraform --soft-fail
          else
            echo "No infra/ directory found, skipping Checkov"
          fi
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 6: SAST Scanning (Semgrep - optional, non-blocking)
  # ─────────────────────────────────────────────────────────────────────────
  sast-semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # Final: Summary (all checks completed)
  # ─────────────────────────────────────────────────────────────────────────
  pr-checks-complete:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, security-audit, build, infrastructure-checks, sast-semgrep]
    if: always()

    steps:
      - name: Check PR checks status
        run: |
          if [ "${{ needs.lint-and-typecheck.result }}" = "failure" ] || \
             [ "${{ needs.unit-tests.result }}" = "failure" ] || \
             [ "${{ needs.security-audit.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ PR checks FAILED"
            exit 1
          else
            echo "✅ PR checks PASSED"
            exit 0
          fi

      - name: Summary
        run: |
          echo "## PR Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Lint & Type Check**: ${{ needs.lint-and-typecheck.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Unit Tests**: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Security Audit**: ${{ needs.security-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Build**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Infrastructure Checks**: ${{ needs.infrastructure-checks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **SAST Scanning**: ${{ needs.sast-semgrep.result }}" >> $GITHUB_STEP_SUMMARY
